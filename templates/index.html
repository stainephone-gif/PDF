<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PPTX Image Extractor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #101010;
      color: #F3F3F3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #080808;
      border: 1px solid #333333;
      border-radius: 8px;
      padding: 24px;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 34px;
      font-weight: 700;
      color: #F3F3F3;
      line-height: 1.07;
      letter-spacing: -0.007px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #949494;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 32px;
    }

    .drop-zone {
      border: 1px solid #333333;
      border-radius: 8px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: #E7C59A;
      background: rgba(231, 197, 154, 0.04);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .drop-icon {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.25rem;
      color: #949494;
      margin-bottom: 10px;
    }

    .drop-label {
      color: #949494;
      font-size: 14px;
      line-height: 1.5;
    }

    .drop-label span {
      color: #E7C59A;
    }

    .file-name {
      margin-top: 10px;
      font-size: 13px;
      color: #E7C59A;
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: -0.037em;
      min-height: 1.2em;
    }

    .btn {
      display: block;
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      border: 1px solid #333333;
      border-radius: 8px;
      background: #FFFFFF;
      color: #101010;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .15s, color .15s;
    }

    .btn:hover { background: #F3F3F3; }
    .btn:disabled {
      background: transparent;
      color: #949494;
      border-color: #333333;
      cursor: not-allowed;
    }

    .progress-wrap {
      display: none;
      margin-top: 16px;
    }

    .progress-bar-bg {
      background: #333333;
      border-radius: 999px;
      height: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #E7C59A;
      border-radius: 999px;
      transition: width .3s;
    }

    .progress-label {
      margin-top: 8px;
      font-size: 13px;
      color: #949494;
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: -0.022em;
    }

    .message {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: -0.022em;
      display: none;
    }

    .message.error {
      background: rgba(197, 48, 48, 0.08);
      color: #F3F3F3;
      border: 1px solid rgba(197, 48, 48, 0.3);
    }

    .message.success {
      background: rgba(0, 172, 92, 0.08);
      color: #00AC5C;
      border: 1px solid rgba(0, 172, 92, 0.3);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>PPTX Image Extractor</h1>
    <p class="subtitle">Загрузите презентацию — получите ZIP с картинками</p>

    <div class="drop-zone" id="dropZone">
      <input type="file" accept=".pptx" id="fileInput" />
      <div class="drop-icon">[ + ]</div>
      <div class="drop-label">Перетащите файл сюда или <span>выберите</span></div>
      <div class="file-name" id="fileName"></div>
    </div>

    <button class="btn" id="extractBtn" disabled>Извлечь картинки</button>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-bg">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-label" id="progressLabel">Отправка файла…</div>
    </div>

    <div class="message" id="message"></div>
  </div>

  <script>
    const fileInput   = document.getElementById("fileInput");
    const dropZone    = document.getElementById("dropZone");
    const fileNameEl  = document.getElementById("fileName");
    const extractBtn  = document.getElementById("extractBtn");
    const progressWrap= document.getElementById("progressWrap");
    const progressBar = document.getElementById("progressBar");
    const progressLbl = document.getElementById("progressLabel");
    const messageEl   = document.getElementById("message");

    function setFile(file) {
      if (!file) return;
      fileNameEl.textContent = file.name;
      extractBtn.disabled = false;
      hideMessage();
    }

    fileInput.addEventListener("change", () => setFile(fileInput.files[0]));

    dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
    dropZone.addEventListener("drop", e => {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      const file = e.dataTransfer.files[0];
      if (file) { fileInput.files = e.dataTransfer.files; setFile(file); }
    });

    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = `message ${type}`;
      messageEl.style.display = "block";
    }

    function hideMessage() {
      messageEl.style.display = "none";
    }

    extractBtn.addEventListener("click", () => {
      const file = fileInput.files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append("file", file);

      extractBtn.disabled = true;
      progressWrap.style.display = "block";
      progressBar.style.width = "0%";
      progressLbl.textContent = "Отправка файла…";
      hideMessage();

      const xhr = new XMLHttpRequest();

      xhr.upload.addEventListener("progress", e => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 80);
          progressBar.style.width = pct + "%";
          progressLbl.textContent = `Загрузка: ${pct}%`;
        }
      });

      xhr.addEventListener("load", () => {
        progressBar.style.width = "100%";
        progressLbl.textContent = "Готово!";

        if (xhr.status === 200) {
          const blob = new Blob([xhr.response], { type: "application/zip" });
          const url  = URL.createObjectURL(blob);
          const a    = document.createElement("a");
          const stem = file.name.replace(/\.pptx$/i, "");
          a.href     = url;
          a.download = `${stem}_images.zip`;
          a.click();
          URL.revokeObjectURL(url);
          showMessage("Архив успешно скачан!", "success");
        } else {
          let err = "Неизвестная ошибка";
          try { err = JSON.parse(xhr.responseText).error; } catch {}
          showMessage(err, "error");
        }

        extractBtn.disabled = false;
        setTimeout(() => { progressWrap.style.display = "none"; }, 1500);
      });

      xhr.addEventListener("error", () => {
        showMessage("Ошибка сети. Проверьте подключение.", "error");
        extractBtn.disabled = false;
        progressWrap.style.display = "none";
      });

      xhr.open("POST", "/extract");
      xhr.responseType = "arraybuffer";
      xhr.send(formData);
    });
  </script>
</body>
</html>
